<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KODESH · Mi Perfil</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:#c9a84c; --gold-bright:#e8c46a; --gold-dim:rgba(201,168,76,0.2); --gold-glow:rgba(201,168,76,0.08);
  --bg:#06060e; --bg2:#0b0b16; --bg3:#10101e;
  --text:#ede5d0; --text-mid:#a89878; --text-dim:#4a4030;
  --border:rgba(255,255,255,0.05); --border2:rgba(201,168,76,0.15);
  --green:#4caf7d; --red:#e05c5c;
}
html[data-theme="light"] {
  --bg:#faf8f3; --bg2:#f3efe4; --bg3:#ede8d8;
  --text:#1a1408; --text-mid:#6b5a38; --text-dim:#b0a080;
  --border:rgba(0,0,0,0.06); --border2:rgba(201,168,76,0.3);
}
html, body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'EB Garamond',Georgia,serif; transition:background 0.3s,color 0.3s; }

/* TOPBAR */
.topbar { background:var(--bg2); border-bottom:1px solid var(--border2); padding-left:24px; padding-right:24px; padding-bottom:14px; padding-top:max(env(safe-area-inset-top),44px); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.back-btn { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:2px; color:var(--text-dim); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.back-btn:hover { color:var(--gold); }
.topbar-title { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.theme-toggle { background:none; border:1px solid var(--border2); border-radius:20px; padding:4px 12px; font-size:0.7rem; cursor:pointer; color:var(--text-mid); transition:all 0.2s; }
.theme-toggle:hover { border-color:var(--gold); color:var(--gold); }

/* MAIN */
.main { max-width:860px; margin:0 auto; padding:32px 20px 80px; }

/* HERO PROFILE */
.profile-hero {
  display:flex; align-items:center; gap:24px;
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:16px; padding:28px; margin-bottom:28px;
  position:relative; overflow:hidden;
}
.profile-hero::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
  pointer-events:none;
}
.profile-avatar {
  width:80px; height:80px; border-radius:50%;
  background:var(--gold-dim); border:2px solid var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:1.6rem; color:var(--gold);
  font-weight:700; flex-shrink:0; overflow:hidden;
}
.profile-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.profile-info { flex:1; }
.profile-name { font-family:'Cinzel',serif; font-size:1.2rem; font-weight:700; color:var(--text); letter-spacing:2px; margin-bottom:4px; }
.profile-email { font-size:0.85rem; color:var(--text-dim); margin-bottom:10px; }
.profile-badges { display:flex; gap:8px; flex-wrap:wrap; }
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:12px;
  font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:1.5px; text-transform:uppercase;
}
.badge-premium { background:rgba(201,168,76,0.12); color:var(--gold); border:1px solid var(--gold-dim); }
.badge-free { background:rgba(255,255,255,0.05); color:var(--text-dim); border:1px solid var(--border); }
.badge-streak { background:rgba(255,140,0,0.1); color:#ff8c00; border:1px solid rgba(255,140,0,0.2); }
.badge-google { background:rgba(66,133,244,0.1); color:#4285f4; border:1px solid rgba(66,133,244,0.2); }

.profile-actions { display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
.btn-read { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; background:var(--gold); border:none; color:#1a0e00; padding:10px 18px; border-radius:8px; cursor:pointer; text-decoration:none; transition:opacity 0.2s; white-space:nowrap; }
.btn-read:hover { opacity:0.85; }
.btn-logout { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid var(--border2); color:var(--text-dim); padding:8px 14px; border-radius:8px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.btn-logout:hover { border-color:var(--red); color:var(--red); }
.btn-delete { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid rgba(224,92,92,0.3); color:var(--red); padding:6px 12px; border-radius:8px; cursor:pointer; transition:all 0.2s; opacity:0.7; white-space:nowrap; }
.btn-delete:hover { opacity:1; border-color:var(--red); background:rgba(224,92,92,0.08); }
@media(max-width:600px) {
  .profile-hero { flex-direction:column; align-items:flex-start; padding:20px; gap:16px; }
  .profile-actions { width:100%; flex-direction:row; flex-wrap:wrap; align-items:center; justify-content:flex-start; }
  .btn-read { flex:1; text-align:center; }
  .btn-logout, .btn-delete { flex:1; text-align:center; }
}

/* MODAL PREMIUM */
.premium-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.88);
  z-index:9999; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(6px);
}
.premium-modal {
  background:var(--bg2); border:1px solid var(--gold-dim);
  border-radius:20px; max-width:400px; width:100%;
  padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}
.premium-modal-icon { font-size:2.8rem; margin-bottom:12px; }
.premium-modal-title {
  font-family:'Cinzel',serif; font-size:1.1rem;
  color:var(--gold); margin-bottom:6px; letter-spacing:2px;
}
.premium-modal-price {
  font-family:'Cinzel',serif; font-size:1.6rem;
  color:var(--text); font-weight:700; margin-bottom:4px;
}
.premium-modal-duration {
  font-size:0.82rem; color:var(--text-dim);
  font-style:italic; margin-bottom:20px;
}
.premium-features {
  background:var(--bg3); border:1px solid var(--border2);
  border-radius:12px; padding:16px; margin-bottom:20px;
  text-align:left;
}
.premium-feature-item {
  display:flex; align-items:center; gap:10px;
  padding:6px 0; font-size:0.88rem; color:var(--text-mid);
}
.premium-feature-item:not(:last-child) {
  border-bottom:1px solid var(--border);
}
.premium-feature-icon { color:var(--gold); font-size:0.9rem; flex-shrink:0; }
.premium-legal {
  font-size:0.72rem; color:var(--text-dim);
  line-height:1.6; margin-bottom:20px;
}
.premium-legal a { color:var(--gold); text-decoration:none; }
.premium-legal a:hover { text-decoration:underline; }
.btn-premium-buy {
  width:100%; font-family:'Cinzel',serif; font-size:0.7rem;
  letter-spacing:2px; text-transform:uppercase;
  background:var(--gold); border:none; color:#1a0e00;
  padding:14px; border-radius:10px; cursor:pointer;
  font-weight:700; margin-bottom:10px; transition:opacity 0.2s;
}
.btn-premium-buy:hover { opacity:0.85; }
.btn-premium-buy:disabled { opacity:0.5; cursor:not-allowed; }
.btn-premium-cancel {
  width:100%; font-family:'Cinzel',serif; font-size:0.6rem;
  letter-spacing:1px; text-transform:uppercase;
  background:none; border:1px solid var(--border2);
  color:var(--text-dim); padding:10px; border-radius:10px;
  cursor:pointer; transition:all 0.2s;
}
.btn-premium-cancel:hover { border-color:var(--gold); color:var(--gold); }

/* MODAL ELIMINAR CUENTA */
.delete-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:9999; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(4px);
}
.delete-modal {
  background:var(--bg2); border:1px solid rgba(224,92,92,0.3);
  border-radius:16px; max-width:420px; width:100%;
  padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  text-align:center;
}
.delete-modal-icon { font-size:2.5rem; margin-bottom:12px; }
.delete-modal-title { font-family:'Cinzel',serif; font-size:1rem; color:var(--red); margin-bottom:12px; letter-spacing:1px; }
.delete-modal-text { font-size:0.9rem; color:var(--text-mid); line-height:1.6; margin-bottom:20px; }
.delete-modal-confirm { width:100%; background:var(--bg3); border:1px solid var(--border2); color:var(--text-dim); font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; padding:10px; border-radius:8px; margin-bottom:12px; outline:none; }
.delete-modal-confirm:focus { border-color:var(--red); }
.delete-modal-buttons { display:flex; gap:10px; }
.btn-cancel-delete { flex:1; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:1px; text-transform:uppercase; background:none; border:1px solid var(--border2); color:var(--text-dim); padding:10px; border-radius:8px; cursor:pointer; transition:all 0.2s; }
.btn-cancel-delete:hover { border-color:var(--gold); color:var(--gold); }
.btn-confirm-delete { flex:1; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:1px; text-transform:uppercase; background:var(--red); border:none; color:#fff; padding:10px; border-radius:8px; cursor:pointer; transition:opacity 0.2s; }
.btn-confirm-delete:disabled { opacity:0.4; cursor:not-allowed; }
.btn-confirm-delete:not(:disabled):hover { opacity:0.85; }

/* STATS GRID */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
@media(max-width:600px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
.stat-card { background:var(--bg2); border:1px solid var(--border2); border-radius:12px; padding:18px; text-align:center; }
.stat-number { font-family:'Cinzel',serif; font-size:1.6rem; font-weight:700; color:var(--gold); line-height:1; margin-bottom:4px; }
.stat-label { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }

/* SECTION */
.section { background:var(--bg2); border:1px solid var(--border2); border-radius:14px; margin-bottom:20px; overflow:hidden; }
.section-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.section-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
.section-body { padding:20px; }

/* USAGE BARS */
.usage-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.usage-row:last-child { margin-bottom:0; }
.usage-label { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:1px; color:var(--text-mid); text-transform:uppercase; width:100px; flex-shrink:0; }
.usage-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; }
.usage-bar-fill { height:100%; border-radius:3px; background:var(--gold); transition:width 0.6s ease; }
.usage-bar-fill.danger { background:var(--red); }
.usage-count { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-mid); width:60px; text-align:right; flex-shrink:0; }

/* GOALS */
.goals-list { display:flex; flex-wrap:wrap; gap:8px; }
.goal-tag { background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:6px 14px; font-size:0.82rem; color:var(--text-mid); font-style:italic; }

/* READING CALENDAR */
.calendar-grid { display:flex; flex-direction:column; gap:4px; }
.cal-week { display:flex; gap:4px; }
.cal-day {
  flex:1; aspect-ratio:1; border-radius:5px;
  border:1px solid var(--border); background:transparent;
  display:flex; align-items:center; justify-content:center;
}
.cal-day.read-full { background:var(--gold); border-color:var(--gold); }
.cal-day.read-partial { background:var(--gold-dim); border-color:var(--gold); }
.cal-day.read-little { background:rgba(201,168,76,0.08); border-color:var(--gold-dim); }
.cal-day.today { outline:2px solid var(--gold); outline-offset:2px; }
.cal-day.future { opacity:0.2; }
.cal-day span { font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--text-dim); }
.cal-day.read-full span, .cal-day.read-partial span { color:var(--gold); }
.cal-day.read-full span { color:#1a0e00; }

/* BOOKMARKS */
.bookmark-list { display:flex; flex-direction:column; gap:8px; }
.bookmark-item {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:12px 16px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:border-color 0.2s; text-decoration:none;
}
.bookmark-item:hover { border-color:var(--border2); }
.bookmark-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.bookmark-ref { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:1px; color:var(--gold); text-transform:uppercase; white-space:nowrap; }
.bookmark-text { font-size:0.9rem; color:var(--text-mid); font-style:italic; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bookmark-empty { text-align:center; padding:24px; color:var(--text-dim); font-style:italic; }

/* NOTES */
.note-item { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:8px; }
.note-ref { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:1px; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
.note-text { font-size:0.9rem; color:var(--text-mid); line-height:1.5; }
.note-empty { text-align:center; padding:24px; color:var(--text-dim); font-style:italic; }

/* TABS */
.profile-tabs { display:flex; border-bottom:1px solid var(--border); }
.profile-tab { flex:1; padding:12px; background:none; border:none; border-bottom:2px solid transparent; font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.profile-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab-panel { display:none; padding:20px; }
.tab-panel.active { display:block; }

/* PROGRESS BAR */
.progress-row { margin-bottom:16px; }
.progress-label-row { display:flex; justify-content:space-between; margin-bottom:6px; }
.progress-name { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:1px; color:var(--text-mid); text-transform:uppercase; }
.progress-pct { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--gold); }
.progress-bar { height:5px; background:var(--border); border-radius:3px; }
.progress-fill { height:100%; border-radius:3px; background:var(--gold); transition:width 0.6s; }

.loading-msg { text-align:center; padding:40px; color:var(--text-dim); font-style:italic; }
</style>
</head>

<div class="topbar">
  <div class="topbar-left">
    <a href="/landing.html" class="back-btn">← Inicio</a>
    <div class="topbar-title">✦ Mi Perfil</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
</div>

<div class="main" id="mainContent">
  <div class="loading-msg">Cargando perfil...</div>
</div>

<script>
const SB_URL = 'https://fvknbqdsgqdmwirrgcvb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2a25icWRzZ3FkbXdpcnJnY3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzU2NjYsImV4cCI6MjA5NjExMTY2Nn0.RqiuH5fafECN1yW5MjBP3zzHAdXLH4QD3gBL_WZ-hB0';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════════
// REVENUECAT — STOREKIT INTEGRATION
// ══════════════════════════════════════════
const RC_API_KEY = 'appl_vspUVvGMnobdbtulUhMZoDptiEK';
const RC_ENTITLEMENT = 'KODESH Pro';
const PRODUCT_ID = 'com.iglesiafreedom.kodesh.premium.monthly';

let rcConfigured = false;
let PurchasesSDK = null;

async function initRevenueCat(userId) {
  if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
  try {
    // El plugin nativo de RevenueCat está registrado en Capacitor.Plugins
    PurchasesSDK = window.Capacitor?.Plugins?.Purchases;
    if (!PurchasesSDK) {
      console.warn('[RC] Plugin Purchases no encontrado en Capacitor.Plugins');
      return;
    }
    await PurchasesSDK.configure({ apiKey: RC_API_KEY, appUserID: userId });
    rcConfigured = true;
    console.log('[RC] RevenueCat configurado para:', userId);
  } catch(e) {
    console.warn('[RC] Init error:', e.message);
  }
}

// ══════════════════════════════════════════
// MODAL PREMIUM — CUMPLE GUIDELINE 3.1.2
// ══════════════════════════════════════════
function showPremiumModal() {
  if (document.getElementById('premiumModalOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'premiumModalOverlay';
  overlay.className = 'premium-modal-overlay';
  overlay.innerHTML = `
    <div class="premium-modal">
      <div class="premium-modal-icon">✦</div>
      <div class="premium-modal-title">KODESH Premium</div>
      <div class="premium-modal-price">$5.99 / mes</div>
      <div class="premium-modal-duration">
        Suscripción mensual · Se renueva automáticamente
      </div>
      <div class="premium-features">
        <div class="premium-feature-item">
          <span class="premium-feature-icon">📖</span>
          Interlineal hebreo-griego ilimitado
        </div>
        <div class="premium-feature-item">
          <span class="premium-feature-icon">🔤</span>
          Lexicón Strong's completo sin límites
        </div>
        <div class="premium-feature-item">
          <span class="premium-feature-icon">🤖</span>
          80 búsquedas · 70 consultas de asistente IA
        </div>
        <div class="premium-feature-item">
          <span class="premium-feature-icon">📅</span>
          52 Porciones Torah + acceso anticipado
        </div>
      </div>
      <div class="premium-legal">
        El pago se cargará a tu cuenta de Apple al confirmar la compra.
        La suscripción se renueva automáticamente por $5.99/mes
        a menos que se cancele al menos 24 horas antes del fin del período actual.
        Puedes gestionar o cancelar en
        <strong>Configuración → [tu nombre] → Suscripciones</strong>.<br><br>
        <a href="https://kodeshbible.com/terminos" target="_blank">Términos de uso</a>
        &nbsp;·&nbsp;
        <a href="https://kodeshbible.com/privacidad" target="_blank">Política de privacidad</a>
      </div>
      <button class="btn-premium-buy" id="btnBuyPremium" onclick="executePurchase()">
        Suscribirse por $5.99/mes
      </button>
      <button class="btn-premium-cancel" onclick="closePremiumModal()">
        Cancelar
      </button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function closePremiumModal() {
  document.getElementById('premiumModalOverlay')?.remove();
  document.body.style.overflow = '';
}

async function executePurchase() {
  const btn = document.getElementById('btnBuyPremium');
  if (!rcConfigured || !PurchasesSDK) {
    if (btn) btn.textContent = 'Cargando tienda...';
    await new Promise(r => setTimeout(r, 1500));
    if (!rcConfigured) {
      alert('La tienda no está disponible. Intenta de nuevo.');
      if (btn) btn.textContent = 'Suscribirse por $5.99/mes';
      return;
    }
  }
  try {
    if (btn) { btn.textContent = 'Procesando...'; btn.disabled = true; }
    const { current } = await PurchasesSDK.getOfferings();
    if (!current || !current.availablePackages?.length) throw new Error('No hay productos disponibles.');
    const pkg = current.availablePackages.find(p => p.product?.identifier === PRODUCT_ID)
      || current.monthly
      || current.availablePackages[0];
    if (!pkg) throw new Error('Producto no encontrado.');
    const { customerInfo } = await PurchasesSDK.purchasePackage({ aPackage: pkg });
    if (customerInfo?.entitlements?.active?.[RC_ENTITLEMENT]) {
      await syncPremiumWithSupabase();
      closePremiumModal();
      alert('🎉 ¡Bienvenido a KODESH Premium!');
      window.location.reload();
    } else {
      throw new Error('La compra no pudo verificarse.');
    }
  } catch(e) {
    console.error('[RC] Purchase error:', e);
    if (btn) { btn.textContent = 'Suscribirse por $5.99/mes'; btn.disabled = false; }
    const cancelled = e.message?.toLowerCase().includes('cancel') || e.code === 'PURCHASE_CANCELLED';
    if (!cancelled) alert('Hubo un problema: ' + (e.message || 'Error desconocido'));
  }
}

function purchasePremium() {
  showPremiumModal();
}

async function restorePurchases() {
  if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
  if (!rcConfigured || !PurchasesSDK) { alert('La tienda no está disponible.'); return; }
  try {
    const btn = document.getElementById('btnRestore');
    if (btn) { btn.textContent = 'Restaurando...'; btn.disabled = true; }
    const { customerInfo } = await PurchasesSDK.restorePurchases();
    if (customerInfo?.entitlements?.active?.[RC_ENTITLEMENT]) {
      await syncPremiumWithSupabase();
      alert('✓ Compras restauradas. ¡Bienvenido de vuelta a Premium!');
      window.location.reload();
    } else {
      alert('No se encontraron compras previas de Premium.');
      if (btn) { btn.textContent = 'Restaurar compras'; btn.disabled = false; }
    }
  } catch(e) {
    console.error('[RC] Restore error:', e);
    alert('Error al restaurar: ' + (e.message || 'Error desconocido'));
  }
}

async function syncPremiumWithSupabase() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) return;
  try {
    await sb.from('user_plans').upsert({
      user_id: session.user.id, plan: 'premium',
      subscription_status: 'active', updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id' });
  } catch(e) { console.warn('[RC] Sync error:', e.message); }
}

// ELIMINAR CUENTA
// ══════════════════════════════════════════
function showDeleteAccountModal() {
  if (document.getElementById('deleteModalOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'deleteModalOverlay';
  overlay.className = 'delete-modal-overlay';
  overlay.innerHTML = `
    <div class="delete-modal">
      <div class="delete-modal-icon">⚠️</div>
      <div class="delete-modal-title">Eliminar Cuenta</div>
      <div class="delete-modal-text">
        Esta acción es <strong>permanente e irreversible</strong>. Se eliminarán todos tus datos:
        progreso de lectura, notas, marcadores, racha, y tu cuenta de acceso.<br><br>
        Para confirmar, escribe <strong>ELIMINAR</strong> en el campo de abajo.
      </div>
      <input
        type="text"
        id="deleteConfirmInput"
        class="delete-modal-confirm"
        placeholder="Escribe ELIMINAR para confirmar"
        oninput="checkDeleteConfirm()"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
      />
      <div id="deleteError" style="color:var(--red);font-size:0.8rem;margin-bottom:10px;display:none;">
        Hubo un error al eliminar tu cuenta. Intenta de nuevo.
      </div>
      <div class="delete-modal-buttons">
        <button class="btn-cancel-delete" onclick="closeDeleteModal()">Cancelar</button>
        <button class="btn-confirm-delete" id="btnConfirmDelete" onclick="confirmDeleteAccount()" disabled>
          Eliminar cuenta
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('deleteConfirmInput')?.focus(), 100);
}

function checkDeleteConfirm() {
  const input = document.getElementById('deleteConfirmInput');
  const btn = document.getElementById('btnConfirmDelete');
  if (!input || !btn) return;
  btn.disabled = input.value.trim().toUpperCase() !== 'ELIMINAR';
}

function closeDeleteModal() {
  document.getElementById('deleteModalOverlay')?.remove();
  document.body.style.overflow = '';
}

async function confirmDeleteAccount() {
  const btn = document.getElementById('btnConfirmDelete');
  const errorEl = document.getElementById('deleteError');
  if (btn) { btn.disabled = true; btn.textContent = 'Eliminando...'; }
  if (errorEl) errorEl.style.display = 'none';
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user) throw new Error('No hay sesión activa');
    const userId = session.user.id;
    await Promise.all([
      sb.from('reading_progress').delete().eq('user_id', userId),
      sb.from('bookmarks').delete().eq('user_id', userId),
      sb.from('chapter_notes').delete().eq('user_id', userId),
      sb.from('reading_streaks').delete().eq('user_id', userId),
      sb.from('ai_usage').delete().eq('user_id', userId),
      sb.from('user_plans').delete().eq('user_id', userId),
      sb.from('user_terms_acceptance').delete().eq('user_id', userId),
    ]);
    await sb.from('user_profiles').delete().eq('id', userId);
    localStorage.clear();
    await sb.auth.signOut();
    closeDeleteModal();
    alert('Tu cuenta ha sido eliminada. Lamentamos verte partir.');
    window.location.href = '/login.html';
  } catch(e) {
    console.error('Delete account error:', e);
    if (errorEl) errorEl.style.display = 'block';
    if (btn) { btn.disabled = false; btn.textContent = 'Eliminar cuenta'; }
  }
}

function initTheme() {
  const t = localStorage.getItem('kodesh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kodesh_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

  const { data: { session } } = await sb.auth.getSession();
  if (!session?.user) { window.location.href = '/login.html'; return; }
  initRevenueCat(session.user.id);
  await loadProfile(session.user);

async function loadProfile(user) {

    sb.from('user_profiles').select('*').eq('id', user.id).single(),

    sb.from('reading_streaks').select('*').eq('user_id', user.id).single(),
    sb.from('ai_usage').select('*').eq('user_id', user.id).eq('month', month).single(),
    sb.from('bookmarks').select('*').eq('user_id', user.id).order('created_at', { ascending: false }),
    sb.from('chapter_notes').select('*').eq('user_id', user.id).order('updated_at', { ascending: false }),

  const isPremium = plan.plan === 'premium' && plan.subscription_status === 'active';

          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${readPct}%"></div></div>
        </div>
        <div class="progress-row">
          <div class="progress-label-row">

function switchTab(tab, btn) {
  document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function buildCalendar(goalChapters) {
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const days = [];
  for (let i = 34; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const raw = localStorage.getItem('kodesh_today_' + str);
    let count = 0;
    try { const parsed = JSON.parse(raw); count = typeof parsed === 'number' ? parsed : (parsed?.count || 0); } catch(e) {}
    days.push({ str, day: d.getDate(), count, isToday: str === todayStr });
  }
  const weeks = [];
  for (let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
  return weeks.map(week => `
    <div class="cal-week">
      ${week.map(d => {
        const ratio = d.count / goalChapters;
        let cls = '';
        if (d.count > 0) {
          if (ratio >= 1) cls = 'read-full';
          else if (ratio >= 0.5) cls = 'read-partial';
          else cls = 'read-little';
        }
        if (d.isToday) cls += ' today';
        return `<div class="cal-day ${cls}"><span>${d.day}</span></div>`;
      }).join('')}
    </div>`).join('');
}
