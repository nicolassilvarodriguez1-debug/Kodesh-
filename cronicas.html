<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODESH · Crónicas del Reino</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#c9a84c; --gold-bright:#e8c46a; --gold-dim:rgba(201,168,76,0.2); --gold-glow:rgba(201,168,76,0.08);
  --bg:#06060e; --bg2:#0b0b16; --bg3:#10101e;
  --text:#ede5d0; --text-mid:#a89878; --text-dim:#4a4030;
  --border:rgba(255,255,255,0.05); --border2:rgba(201,168,76,0.15);
}
html[data-theme="light"] {
  --bg:#faf8f3; --bg2:#f3efe4; --bg3:#ede8d8;
  --text:#1a1408; --text-mid:#6b5a38; --text-dim:#b0a080;
  --border:rgba(0,0,0,0.06); --border2:rgba(201,168,76,0.3);
}
html, body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'EB Garamond',Georgia,serif; overflow-x:hidden; transition:background 0.3s,color 0.3s; }

.bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 70%); }

/* TOPBAR */
.topbar { background:var(--bg2); border-bottom:1px solid var(--border2); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.back-btn { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:2px; color:var(--text-dim); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.back-btn:hover { color:var(--gold); }
.topbar-title { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.theme-toggle { background:none; border:1px solid var(--border2); border-radius:20px; padding:4px 12px; font-size:0.7rem; cursor:pointer; color:var(--text-mid); transition:all 0.2s; }
.theme-toggle:hover { border-color:var(--gold); color:var(--gold); }

/* HERO */
.hero { position:relative; z-index:1; text-align:center; padding:48px 20px 32px; }
.hero-eyebrow { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:5px; color:var(--gold); text-transform:uppercase; margin-bottom:14px; opacity:0.8; }
.hero-title { font-family:'Cinzel Decorative',serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:700; color:var(--text); letter-spacing:3px; margin-bottom:10px; }
.hero-title span { color:var(--gold); }
.hero-sub { font-size:1rem; color:var(--text-mid); font-style:italic; max-width:400px; margin:0 auto; }

/* MAIN */
.main { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:0 20px 80px; }

/* SECTION HEADER */
.section-head { display:flex; align-items:center; justify-content:space-between; margin:36px 0 18px; }
.section-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.section-count { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:2px; color:var(--text-dim); }

/* CANCIONES */
.canciones-grid { display:flex; flex-direction:column; gap:12px; }
.cancion-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:12px; padding:16px 20px;
  display:flex; align-items:center; gap:16px;
  transition:all 0.2s;
}
.cancion-card:hover { border-color:var(--gold-dim); box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.cancion-cover {
  width:56px; height:56px; border-radius:8px; flex-shrink:0;
  background:var(--bg3); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; overflow:hidden;
}
.cancion-cover img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
.cancion-info { flex:1; min-width:0; }
.cancion-titulo { font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:1px; color:var(--text); text-transform:uppercase; margin-bottom:3px; }
.cancion-personaje { font-size:0.85rem; color:var(--text-mid); font-style:italic; margin-bottom:4px; }
.cancion-desc { font-size:0.8rem; color:var(--text-dim); }
.cancion-actions { display:flex; gap:8px; flex-shrink:0; }
.btn-play {
  background:var(--gold); border:none; color:#1a0e00;
  font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase;
  padding:8px 16px; border-radius:7px; cursor:pointer; transition:opacity 0.2s; white-space:nowrap;
}
.btn-play:hover { opacity:0.85; }
.btn-play.playing { background:var(--bg3); color:var(--gold); border:1px solid var(--gold-dim); }

/* AUDIO PLAYER */
.player-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:var(--bg2); border-top:1px solid var(--gold-dim);
  padding:12px 24px; display:none; align-items:center; gap:16px;
  backdrop-filter:blur(12px);
}
.player-bar.visible { display:flex; }
.player-info { flex:1; min-width:0; }
.player-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; color:var(--gold); text-transform:uppercase; }
.player-artist { font-size:0.78rem; color:var(--text-dim); font-style:italic; }
.player-controls { display:flex; align-items:center; gap:12px; }
.btn-ctrl { background:none; border:1px solid var(--border2); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-mid); transition:all 0.2s; font-size:0.9rem; }
.btn-ctrl:hover { border-color:var(--gold); color:var(--gold); }
.btn-ctrl.main { background:var(--gold); border-color:var(--gold); color:#1a0e00; width:42px; height:42px; font-size:1.1rem; }
.player-progress { flex:1; max-width:200px; }
.progress-track { height:3px; background:var(--border); border-radius:2px; cursor:pointer; }
.progress-fill { height:100%; background:var(--gold); border-radius:2px; width:0%; transition:width 0.5s linear; }
.player-time { font-family:'Cinzel',serif; font-size:0.55rem; color:var(--text-dim); white-space:nowrap; }
.btn-close-player { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1rem; padding:4px 8px; transition:color 0.2s; }
.btn-close-player:hover { color:var(--text); }

/* ACTIVIDADES */
.actividades-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
.actividad-card {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:12px; overflow:hidden; transition:all 0.2s;
}
.actividad-card:hover { border-color:var(--gold-dim); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.actividad-preview {
  width:100%; height:140px; background:var(--bg3);
  display:flex; align-items:center; justify-content:center;
  font-size:2.5rem; border-bottom:1px solid var(--border);
  overflow:hidden;
}
.actividad-preview img { width:100%; height:100%; object-fit:cover; }
.actividad-body { padding:14px; }
.actividad-titulo { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; color:var(--text); text-transform:uppercase; margin-bottom:4px; }
.actividad-meta { font-size:0.78rem; color:var(--text-dim); font-style:italic; margin-bottom:10px; }
.actividad-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.tag { font-family:'Cinzel',serif; font-size:0.45rem; letter-spacing:1px; padding:2px 8px; border-radius:4px; text-transform:uppercase; background:var(--bg3); color:var(--text-dim); border:1px solid var(--border); }
.btn-download {
  width:100%; background:transparent; border:1px solid var(--gold-dim); color:var(--gold);
  font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase;
  padding:8px; border-radius:7px; cursor:pointer; transition:all 0.2s; text-decoration:none;
  display:block; text-align:center;
}
.btn-download:hover { background:var(--gold-glow); }

.empty-state { text-align:center; padding:48px; color:var(--text-dim); }
.empty-icon { font-size:2rem; margin-bottom:12px; }
.empty-title { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.empty-sub { font-size:0.85rem; font-style:italic; }
</style>
</head>
<body>

<div class="bg-canvas"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/landing.html" class="back-btn">← Inicio</a>
    <div class="topbar-title">✦ Crónicas del Reino</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">✦ Iglesia Freedom</div>
  <h1 class="hero-title">Crónicas del <span>Reino</span></h1>
  <p class="hero-sub">Música, historias y recursos para crecer en la fe</p>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CANCIONES -->
  <div class="section-head">
    <div class="section-title">🎵 Canciones</div>
    <div class="section-count" id="countCanciones">—</div>
  </div>
  <div class="canciones-grid" id="cancionesGrid">
    <div class="empty-state"><div class="empty-icon">🎵</div><div class="empty-title">Pronto</div><div class="empty-sub">Las canciones aparecerán aquí</div></div>
  </div>

  <!-- ACTIVIDADES -->
  <div class="section-head">
    <div class="section-title">🎨 Actividades para Niños</div>
    <div class="section-count" id="countActividades">—</div>
  </div>
  <div class="actividades-grid" id="actividadesGrid">
    <div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎨</div><div class="empty-title">Pronto</div><div class="empty-sub">Las actividades aparecerán aquí</div></div>
  </div>

</div>

<!-- AUDIO PLAYER -->
<div class="player-bar" id="playerBar">
  <div class="player-info">
    <div class="player-title" id="playerTitle">—</div>
    <div class="player-artist" id="playerArtist">—</div>
  </div>
  <div class="player-controls">
    <button class="btn-ctrl main" onclick="togglePlay()" id="btnPlay">▶</button>
  </div>
  <div class="player-progress">
    <div class="progress-track" onclick="seekAudio(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  <div class="player-time" id="playerTime">0:00</div>
  <button class="btn-close-player" onclick="closePlayer()">✕</button>
</div>

<audio id="audioEl" onended="onAudioEnd()" ontimeupdate="onTimeUpdate()"></audio>

<script>
const SB_URL = 'https://fvknbqdsgqdmwirrgcvb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2a25icWRzZ3FkbXdpcnJnY3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzU2NjYsImV4cCI6MjA5NjExMTY2Nn0.RqiuH5fafECN1yW5MjBP3zzHAdXLH4QD3gBL_WZ-hB0';
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentCancionId = null;
const audio = document.getElementById('audioEl');

// THEME
function initTheme() {
  const t = localStorage.getItem('kodesh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kodesh_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

// LOAD
async function init() {
  initTheme();
  await Promise.all([loadCanciones(), loadActividades()]);
}

async function loadCanciones() {
  const { data } = await sb.from('canciones').select('*').order('created_at', { ascending: false });
  const list = data || [];
  document.getElementById('countCanciones').textContent = `${list.length} canción${list.length !== 1 ? 'es' : ''}`;
  const grid = document.getElementById('cancionesGrid');
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎵</div><div class="empty-title">Próximamente</div><div class="empty-sub">Las canciones aparecerán aquí</div></div>`; return; }
  grid.innerHTML = list.map(c => `
    <div class="cancion-card" id="card-${c.id}">
      <div class="cancion-cover">
        ${c.imagen_url ? `<img src="${c.imagen_url}" alt="${c.titulo}">` : '🎵'}
      </div>
      <div class="cancion-info">
        <div class="cancion-titulo">${c.titulo}</div>
        ${c.personaje ? `<div class="cancion-personaje">${c.personaje}</div>` : ''}
        ${c.descripcion ? `<div class="cancion-desc">${c.descripcion}</div>` : ''}
      </div>
      <div class="cancion-actions">
        <button class="btn-play" id="btn-${c.id}" onclick="playCancion('${c.id}','${c.titulo}','${c.personaje||''}','${c.archivo_url}')">▶ Escuchar</button>
      </div>
    </div>`).join('');
}

async function loadActividades() {
  const { data } = await sb.from('actividades').select('*').order('created_at', { ascending: false });
  const list = data || [];
  document.getElementById('countActividades').textContent = `${list.length} actividad${list.length !== 1 ? 'es' : ''}`;
  const grid = document.getElementById('actividadesGrid');
  if (!list.length) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎨</div><div class="empty-title">Próximamente</div><div class="empty-sub">Las actividades aparecerán aquí</div></div>`; return; }

  const CATEGORIA_ICONS = { colorear:'🖍️', manualidad:'✂️', juego:'🎮', leccion:'📖', otro:'📄' };
  grid.innerHTML = list.map(a => `
    <div class="actividad-card">
      <div class="actividad-preview">
        ${a.preview_url ? `<img src="${a.preview_url}" alt="${a.titulo}">` : (CATEGORIA_ICONS[a.categoria] || '📄')}
      </div>
      <div class="actividad-body">
        <div class="actividad-titulo">${a.titulo}</div>
        ${a.categoria || a.edad ? `<div class="actividad-meta">${[a.categoria, a.edad].filter(Boolean).join(' · ')}</div>` : ''}
        <div class="actividad-tags">
          ${a.tipo ? `<span class="tag">${a.tipo.toUpperCase()}</span>` : ''}
          ${a.categoria ? `<span class="tag">${a.categoria}</span>` : ''}
        </div>
        <a href="${a.archivo_url}" target="_blank" download class="btn-download">⬇ Descargar</a>
      </div>
    </div>`).join('');
}

// AUDIO PLAYER
function playCancion(id, titulo, personaje, url) {
  if (currentCancionId === id && !audio.paused) {
    audio.pause();
    document.getElementById('btn-' + id).textContent = '▶ Escuchar';
    document.getElementById('btn-' + id).classList.remove('playing');
    document.getElementById('btnPlay').textContent = '▶';
    return;
  }

  // Reset previous button
  if (currentCancionId && currentCancionId !== id) {
    const prevBtn = document.getElementById('btn-' + currentCancionId);
    if (prevBtn) { prevBtn.textContent = '▶ Escuchar'; prevBtn.classList.remove('playing'); }
  }

  currentCancionId = id;
  audio.src = url;
  audio.play();

  document.getElementById('btn-' + id).textContent = '⏸ Pausar';
  document.getElementById('btn-' + id).classList.add('playing');
  document.getElementById('playerTitle').textContent = titulo;
  document.getElementById('playerArtist').textContent = personaje || 'Crónicas del Reino';
  document.getElementById('playerBar').classList.add('visible');
  document.getElementById('btnPlay').textContent = '⏸';
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    document.getElementById('btnPlay').textContent = '⏸';
    const btn = document.getElementById('btn-' + currentCancionId);
    if (btn) { btn.textContent = '⏸ Pausar'; btn.classList.add('playing'); }
  } else {
    audio.pause();
    document.getElementById('btnPlay').textContent = '▶';
    const btn = document.getElementById('btn-' + currentCancionId);
    if (btn) { btn.textContent = '▶ Escuchar'; btn.classList.remove('playing'); }
  }
}

function closePlayer() {
  audio.pause();
  audio.src = '';
  currentCancionId = null;
  document.getElementById('playerBar').classList.remove('visible');
  document.querySelectorAll('.btn-play').forEach(b => { b.textContent = '▶ Escuchar'; b.classList.remove('playing'); });
}

function onAudioEnd() {
  document.getElementById('btnPlay').textContent = '▶';
  const btn = document.getElementById('btn-' + currentCancionId);
  if (btn) { btn.textContent = '▶ Escuchar'; btn.classList.remove('playing'); }
  document.getElementById('progressFill').style.width = '0%';
}

function onTimeUpdate() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const cur = Math.floor(audio.currentTime);
  const m = Math.floor(cur / 60), s = cur % 60;
  document.getElementById('playerTime').textContent = `${m}:${String(s).padStart(2,'0')}`;
}

function seekAudio(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

init();
</script>
</body>
</html>
