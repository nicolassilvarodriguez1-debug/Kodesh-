<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KODESH · Niños del Reino</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.2); --gold-glow:rgba(201,168,76,0.08);
  --bg:#06060e; --bg2:#0b0b16; --bg3:#10101e;
  --text:#ede5d0; --text-mid:#a89878; --text-dim:#4a4030;
  --border:rgba(255,255,255,0.05); --border2:rgba(201,168,76,0.15);
}
html[data-theme="light"] {
  --bg:#faf8f3; --bg2:#f3efe4; --bg3:#ede8d8;
  --text:#1a1408; --text-mid:#6b5a38; --text-dim:#b0a080;
  --border:rgba(0,0,0,0.06); --border2:rgba(201,168,76,0.3);
}
html, body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'EB Garamond',Georgia,serif; transition:background 0.3s,color 0.3s; }

.topbar { background:var(--bg2); border-bottom:1px solid var(--border2); padding-left:24px; padding-right:24px; padding-bottom:14px; padding-top:max(env(safe-area-inset-top),44px); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.back-btn { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:2px; color:var(--text-dim); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.back-btn:hover { color:var(--gold); }
.topbar-title { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.theme-toggle { background:none; border:1px solid var(--border2); border-radius:20px; padding:4px 12px; font-size:0.7rem; cursor:pointer; color:var(--text-mid); transition:all 0.2s; }
.theme-toggle:hover { border-color:var(--gold); color:var(--gold); }

.hero { text-align:center; padding:44px 20px 28px; }
.hero-eyebrow { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:5px; color:var(--gold); text-transform:uppercase; margin-bottom:12px; opacity:0.8; }
.hero-title { font-family:'Cinzel',serif; font-size:clamp(1.6rem,5vw,2.8rem); font-weight:700; color:var(--text); letter-spacing:3px; margin-bottom:8px; }
.hero-title span { color:var(--gold); }
.hero-sub { font-size:1rem; color:var(--text-mid); font-style:italic; }

.main { max-width:900px; margin:0 auto; padding:0 20px 80px; }

/* FILTERS */
.filters { display:flex; gap:8px; flex-wrap:wrap; margin:24px 0 20px; }
.filter-btn { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase; padding:6px 14px; border-radius:20px; border:1px solid var(--border2); background:none; color:var(--text-dim); cursor:pointer; transition:all 0.2s; }
.filter-btn.active, .filter-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-glow); }

/* GRID */
.actividades-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
.actividad-card { background:var(--bg2); border:1px solid var(--border2); border-radius:12px; overflow:hidden; transition:all 0.2s; }
.actividad-card:hover { border-color:var(--gold-dim); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.actividad-preview { width:100%; height:150px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:3rem; border-bottom:1px solid var(--border); overflow:hidden; }
.actividad-preview img { width:100%; height:100%; object-fit:cover; }
.actividad-body { padding:14px; }
.actividad-titulo { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; color:var(--text); text-transform:uppercase; margin-bottom:4px; }
.actividad-meta { font-size:0.78rem; color:var(--text-dim); font-style:italic; margin-bottom:10px; }
.actividad-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.tag { font-family:'Cinzel',serif; font-size:0.45rem; letter-spacing:1px; padding:2px 7px; border-radius:4px; text-transform:uppercase; background:var(--bg3); color:var(--text-dim); border:1px solid var(--border); }
.btn-download { width:100%; background:transparent; border:1px solid var(--gold-dim); color:var(--gold); font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase; padding:8px; border-radius:7px; cursor:pointer; transition:all 0.2s; text-decoration:none; display:block; text-align:center; }
.btn-download:hover { background:var(--gold-glow); }

.empty-state { text-align:center; padding:60px; color:var(--text-dim); grid-column:1/-1; }
.empty-icon { font-size:2.5rem; margin-bottom:12px; }
.empty-title { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.empty-sub { font-size:0.85rem; font-style:italic; }
.count-label { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:16px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/landing.html" class="back-btn">← Inicio</a>
    <div class="topbar-title">🎨 Niños del Reino</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
</div>

<div class="hero">
  <div class="hero-eyebrow">✦ Recursos para niños</div>
  <h1 class="hero-title">Niños del <span>Reino</span></h1>
  <p class="hero-sub">Hojas de colorear, manualidades y actividades bíblicas</p>
</div>

<div class="main">
  <div class="filters" id="filtersBar">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('colorear',this)">🖍️ Colorear</button>
    <button class="filter-btn" onclick="setFilter('manualidad',this)">✂️ Manualidades</button>
    <button class="filter-btn" onclick="setFilter('juego',this)">🎮 Juegos</button>
    <button class="filter-btn" onclick="setFilter('leccion',this)">📖 Lecciones</button>
  </div>
  <div class="count-label" id="countLabel">Cargando...</div>
  <div class="actividades-grid" id="actGrid">
    <div class="empty-state"><div class="empty-icon">🎨</div><div class="empty-title">Cargando</div></div>
  </div>
</div>

<script>
const SB_URL = 'https://fvknbqdsgqdmwirrgcvb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2a25icWRzZ3FkbXdpcnJnY3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzU2NjYsImV4cCI6MjA5NjExMTY2Nn0.RqiuH5fafECN1yW5MjBP3zzHAdXLH4QD3gBL_WZ-hB0';
const sb = supabase.createClient(SB_URL, SB_KEY);

let allActividades = [];
let activeFilter = 'todos';
const ICONS = { colorear:'🖍️', manualidad:'✂️', juego:'🎮', leccion:'📖', otro:'📄' };

function initTheme() {
  const t = localStorage.getItem('kodesh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kodesh_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderActividades();
}

function renderActividades() {
  const filtered = activeFilter === 'todos' ? allActividades : allActividades.filter(a => a.categoria === activeFilter);
  document.getElementById('countLabel').textContent = `${filtered.length} actividad${filtered.length !== 1 ? 'es' : ''}`;
  const grid = document.getElementById('actGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎨</div><div class="empty-title">Sin actividades</div><div class="empty-sub">Pronto habrá contenido en esta categoría</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(a => `
    <div class="actividad-card">
      <div class="actividad-preview">
        ${a.preview_url ? `<img src="${a.preview_url}" alt="${a.titulo}">` : (ICONS[a.categoria] || '📄')}
      </div>
      <div class="actividad-body">
        <div class="actividad-titulo">${a.titulo}</div>
        ${a.edad ? `<div class="actividad-meta">${a.edad}</div>` : ''}
        <div class="actividad-tags">
          ${a.tipo ? `<span class="tag">${a.tipo.toUpperCase()}</span>` : ''}
          ${a.categoria ? `<span class="tag">${a.categoria}</span>` : ''}
        </div>
        <a href="${a.archivo_url}" target="_blank" download class="btn-download">⬇ Descargar</a>
      </div>
    </div>`).join('');
}

async function init() {
  initTheme();
  const { data } = await sb.from('actividades').select('*').order('created_at', { ascending: false });
  allActividades = data || [];
  renderActividades();
}

init();
</script>
</body>
</html>
