<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODESH · Subir Contenido</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.25); --gold-glow:rgba(201,168,76,0.1);
  --bg:#05050a; --bg2:#0a0a12; --bg3:#0f0f18;
  --text:#e8e0cc; --text-mid:#a09070; --text-dim:#5a5040;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --green:#4caf7d; --red:#e05c5c;
}
html[data-theme="light"] {
  --bg:#faf8f3; --bg2:#f3efe4; --bg3:#ede8d8;
  --text:#1a1408; --text-mid:#6b5a38; --text-dim:#b0a080;
  --border:rgba(0,0,0,0.06); --border2:rgba(201,168,76,0.3);
}
html, body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; transition:background 0.3s,color 0.3s; }

#authGate { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
#authGate h2 { font-family:'Cinzel',serif; color:var(--gold); letter-spacing:3px; font-size:0.8rem; text-transform:uppercase; }
#authGate p { color:var(--red); font-size:0.8rem; }
#mainPanel { display:none; }

.topbar { background:var(--bg2); border-bottom:1px solid var(--gold-dim); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
.topbar-left { display:flex; align-items:center; gap:16px; }
.back-btn { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:2px; color:var(--text-dim); text-decoration:none; text-transform:uppercase; transition:color 0.2s; }
.back-btn:hover { color:var(--gold); }
.topbar-title { font-family:'Cinzel',serif; font-size:0.72rem; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
.theme-toggle { background:none; border:1px solid var(--gold-dim); border-radius:20px; padding:5px 12px; font-size:0.7rem; cursor:pointer; color:var(--text-mid); transition:all 0.2s; }
.theme-toggle:hover { color:var(--gold); }

.main { max-width:900px; margin:0 auto; padding:32px 24px; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:28px; background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:6px; }
.tab { flex:1; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; padding:10px; background:none; border:none; border-radius:7px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; }
.tab.active { background:var(--gold); color:#1a0e00; font-weight:700; }

.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* CARDS */
.section-title { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); }

.upload-card { background:var(--bg2); border:1px solid var(--border2); border-radius:12px; padding:24px; margin-bottom:24px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:0.55rem; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; display:block; margin-bottom:5px; }
.form-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:7px; padding:9px 14px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.82rem; outline:none; transition:border-color 0.2s; }
.form-input:focus { border-color:var(--gold); }
.form-input::placeholder { color:var(--text-dim); }
.form-select { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:7px; padding:9px 14px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.82rem; outline:none; cursor:pointer; }
.btn-upload { width:100%; background:var(--gold); border:none; color:#1a0e00; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; padding:12px; border-radius:8px; cursor:pointer; transition:opacity 0.2s; font-weight:700; margin-top:4px; }
.btn-upload:hover { opacity:0.85; }
.btn-upload:disabled { opacity:0.4; cursor:not-allowed; }
.upload-msg { font-size:0.75rem; margin-top:10px; text-align:center; min-height:20px; padding:6px; border-radius:6px; }
.upload-msg.ok { color:var(--green); background:rgba(76,175,125,0.08); border:1px solid rgba(76,175,125,0.2); }
.upload-msg.err { color:var(--red); background:rgba(224,92,92,0.08); border:1px solid rgba(224,92,92,0.2); }
.upload-msg.loading { color:var(--gold); background:var(--gold-glow); border:1px solid var(--gold-dim); }

/* LIST */
.content-list { display:flex; flex-direction:column; gap:8px; }
.content-item { background:var(--bg2); border:1px solid var(--border2); border-radius:9px; padding:12px 16px; display:flex; align-items:center; gap:12px; }
.content-icon { font-size:1.4rem; flex-shrink:0; }
.content-info { flex:1; min-width:0; }
.content-name { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; color:var(--text); text-transform:uppercase; margin-bottom:2px; }
.content-meta { font-size:0.7rem; color:var(--text-dim); }
.content-actions { display:flex; gap:8px; }
.btn-view { background:none; border:1px solid var(--border2); color:var(--text-mid); font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:5px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
.btn-view:hover { color:var(--gold); border-color:var(--gold-dim); }
.btn-del { background:none; border:1px solid rgba(224,92,92,0.3); color:var(--red); font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:1px; text-transform:uppercase; padding:4px 10px; border-radius:5px; cursor:pointer; transition:all 0.2s; }
.btn-del:hover { background:rgba(224,92,92,0.1); }
.loading { text-align:center; padding:24px; color:var(--text-dim); font-style:italic; }
</style>
</head>
<body>

<div id="authGate">
  <h2>✦ KODESH · Subir Contenido</h2>
  <p id="authMsg">Verificando acceso...</p>
</div>

<div id="mainPanel">
  <div class="topbar">
    <div class="topbar-left">
      <a href="/admin.html" class="back-btn">← Admin</a>
      <div class="topbar-title">✦ Subir Contenido</div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('canciones',this)">🎵 Canciones</button>
      <button class="tab" onclick="switchTab('actividades',this)">🎨 Actividades</button>
    </div>

    <!-- CANCIONES -->
    <div class="tab-panel active" id="tab-canciones">
      <div class="section-title">Nueva canción</div>
      <div class="upload-card">
        <div class="form-group">
          <label class="form-label">Título *</label>
          <input class="form-input" id="cTitulo" placeholder="Ej: Salmo 23 — El Buen Pastor">
        </div>
        <div class="form-group">
          <label class="form-label">Personaje / Serie</label>
          <input class="form-input" id="cPersonaje" placeholder="Ej: David, Moisés...">
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <input class="form-input" id="cDesc" placeholder="Breve descripción...">
        </div>
        <div class="form-group">
          <label class="form-label">Archivo de audio (MP3) *</label>
          <input class="form-input" type="file" id="cAudio" accept="audio/*">
        </div>
        <div class="form-group">
          <label class="form-label">Imagen de portada (opcional)</label>
          <input class="form-input" type="file" id="cImagen" accept="image/*">
        </div>
        <button class="btn-upload" onclick="subirCancion()" id="btnC">↑ Subir Canción</button>
        <div class="upload-msg" id="msgC"></div>
      </div>

      <div class="section-title">Canciones publicadas — <span id="countC">—</span></div>
      <div class="content-list" id="listC"><div class="loading">Cargando...</div></div>
    </div>

    <!-- ACTIVIDADES -->
    <div class="tab-panel" id="tab-actividades">
      <div class="section-title">Nueva actividad</div>
      <div class="upload-card">
        <div class="form-group">
          <label class="form-label">Título *</label>
          <input class="form-input" id="aTitulo" placeholder="Ej: Colorea el Arca de Noé">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="aCategoria">
            <option value="colorear">🖍️ Hoja para colorear</option>
            <option value="manualidad">✂️ Manualidad</option>
            <option value="juego">🎮 Juego / Actividad</option>
            <option value="leccion">📖 Lección bíblica</option>
            <option value="otro">📄 Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Edad recomendada</label>
          <input class="form-input" id="aEdad" placeholder="Ej: 4-8 años">
        </div>
        <div class="form-group">
          <label class="form-label">Archivo (PDF o imagen) *</label>
          <input class="form-input" type="file" id="aArchivo" accept=".pdf,image/*">
        </div>
        <div class="form-group">
          <label class="form-label">Imagen de vista previa (recomendado)</label>
          <div style="font-size:0.65rem;color:var(--text-dim);margin-bottom:6px;font-style:italic">Si el archivo es PDF, sube una captura de pantalla para mostrar la vista previa</div>
          <input class="form-input" type="file" id="aPreview" accept="image/*">
        </div>
        <button class="btn-upload" onclick="subirActividad()" id="btnA">↑ Subir Actividad</button>
        <div class="upload-msg" id="msgA"></div>
      </div>

      <div class="section-title">Actividades publicadas — <span id="countA">—</span></div>
      <div class="content-list" id="listA"><div class="loading">Cargando...</div></div>
    </div>
  </div>
</div>

<script>
const ADMIN_ID = 'ce384f84-a3fd-41b9-a33c-163625e01804';
const SB_URL = 'https://fvknbqdsgqdmwirrgcvb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2a25icWRzZ3FkbXdpcnJnY3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzU2NjYsImV4cCI6MjA5NjExMTY2Nn0.RqiuH5fafECN1yW5MjBP3zzHAdXLH4QD3gBL_WZ-hB0';
const sb = supabase.createClient(SB_URL, SB_KEY);
let currentUserId = null;

function initTheme() {
  const t = localStorage.getItem('kodesh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kodesh_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

async function init() {
  initTheme();
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('authMsg').textContent = 'Inicia sesión primero.'; return; }
  currentUserId = session.user.id;

  // Verify role
  const { data: role } = await sb.from('admin_roles').select('role').eq('user_id', currentUserId).single();
  if (!role) { document.getElementById('authMsg').textContent = '⛔ Acceso denegado.'; return; }

  document.getElementById('authGate').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';
  await Promise.all([loadCanciones(), loadActividades()]);
}

// ── CANCIONES ──
async function loadCanciones() {
  const { data } = await sb.from('canciones').select('*').order('created_at', { ascending: false });
  const list = data || [];
  document.getElementById('countC').textContent = list.length;
  document.getElementById('listC').innerHTML = list.length === 0
    ? '<div class="loading">No hay canciones aún.</div>'
    : list.map(c => `
      <div class="content-item">
        <div class="content-icon">${c.imagen_url ? `<img src="${c.imagen_url}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;">` : '🎵'}</div>
        <div class="content-info">
          <div class="content-name">${c.titulo}</div>
          <div class="content-meta">${[c.personaje, c.descripcion].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="content-actions">
          <a class="btn-view" href="${c.archivo_url}" target="_blank">▶ Escuchar</a>
          <button class="btn-del" onclick="eliminarCancion('${c.id}','${c.archivo_url}','${c.imagen_url||''}')">✕</button>
        </div>
      </div>`).join('');
}

async function subirCancion() {
  const titulo = document.getElementById('cTitulo').value.trim();
  const audioFile = document.getElementById('cAudio').files[0];
  const imgFile = document.getElementById('cImagen').files[0];
  const btn = document.getElementById('btnC');
  const msg = document.getElementById('msgC');

  if (!titulo || !audioFile) { msg.textContent = 'Título y audio son requeridos.'; msg.className='upload-msg err'; return; }

  btn.disabled = true;
  msg.textContent = 'Subiendo archivo de audio...'; msg.className = 'upload-msg loading';

  try {
    const audioExt = audioFile.name.split('.').pop();
    const safeName = titulo.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_]/g,'_');
    const audioPath = `${Date.now()}_${safeName}.${audioExt}`;
    const { error: audioErr } = await sb.storage.from('canciones').upload(audioPath, audioFile, { cacheControl:'3600', upsert:false });
    if (audioErr) throw audioErr;
    const audioUrl = `${SB_URL}/storage/v1/object/public/canciones/${audioPath}`;

    let imgUrl = null;
    if (imgFile) {
      msg.textContent = 'Subiendo portada...'; 
      const imgExt = imgFile.name.split('.').pop();
      const imgPath = `covers/${Date.now()}_cover.${imgExt}`;
      const { error: imgErr } = await sb.storage.from('canciones').upload(imgPath, imgFile, { cacheControl:'3600', upsert:false });
      if (!imgErr) {
        imgUrl = `${SB_URL}/storage/v1/object/public/canciones/${imgPath}`;
      }
    }

    msg.textContent = 'Guardando en base de datos...';
    const { error: dbErr } = await sb.from('canciones').insert({
      titulo,
      personaje: document.getElementById('cPersonaje').value.trim() || null,
      descripcion: document.getElementById('cDesc').value.trim() || null,
      archivo_url: audioUrl,
      imagen_url: imgUrl,
      uploaded_by: currentUserId
    });
    if (dbErr) throw dbErr;

    msg.textContent = '✓ Canción subida exitosamente.'; msg.className = 'upload-msg ok';
    ['cTitulo','cPersonaje','cDesc','cAudio','cImagen'].forEach(id => document.getElementById(id).value = '');
    await loadCanciones();
  } catch(e) {
    msg.textContent = 'Error: ' + (e.message || JSON.stringify(e)); msg.className = 'upload-msg err';
  }
  btn.disabled = false; btn.textContent = '↑ Subir Canción';
}

async function eliminarCancion(id, audioUrl, imgUrl) {
  if (!confirm('¿Eliminar esta canción?')) return;
  await sb.from('canciones').delete().eq('id', id);
  const tryRemove = (url, bucket) => {
    if (!url) return;
    const path = url.split(`/${bucket}/`)[1];
    if (path) sb.storage.from(bucket).remove([decodeURIComponent(path)]);
  };
  tryRemove(audioUrl, 'canciones');
  tryRemove(imgUrl, 'canciones');
  await loadCanciones();
}

// ── ACTIVIDADES ──
async function loadActividades() {
  const { data } = await sb.from('actividades').select('*').order('created_at', { ascending: false });
  const list = data || [];
  const ICONS = { colorear:'🖍️', manualidad:'✂️', juego:'🎮', leccion:'📖', otro:'📄' };
  document.getElementById('countA').textContent = list.length;
  document.getElementById('listA').innerHTML = list.length === 0
    ? '<div class="loading">No hay actividades aún.</div>'
    : list.map(a => `
      <div class="content-item">
        <div class="content-icon">${ICONS[a.categoria] || '📄'}</div>
        <div class="content-info">
          <div class="content-name">${a.titulo}</div>
          <div class="content-meta">${[a.categoria, a.edad, a.tipo?.toUpperCase()].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="content-actions">
          <a class="btn-view" href="${a.archivo_url}" target="_blank">⬇ Ver</a>
          <button class="btn-del" onclick="eliminarActividad('${a.id}','${a.archivo_url}')">✕</button>
        </div>
      </div>`).join('');
}

async function subirActividad() {
  const titulo = document.getElementById('aTitulo').value.trim();
  const archivo = document.getElementById('aArchivo').files[0];
  const btn = document.getElementById('btnA');
  const msg = document.getElementById('msgA');

  if (!titulo || !archivo) { msg.textContent = 'Título y archivo son requeridos.'; msg.className='upload-msg err'; return; }

  btn.disabled = true;
  msg.textContent = 'Subiendo archivo...'; msg.className = 'upload-msg loading';

  try {
    const ext = archivo.name.split('.').pop().toLowerCase();
    const tipo = ['pdf'].includes(ext) ? 'pdf' : 'imagen';
    const safeName = titulo.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_]/g,'_');
    const path = `${Date.now()}_${safeName}.${ext}`;
    const { error: upErr } = await sb.storage.from('actividades').upload(path, archivo, { cacheControl:'3600', upsert:false });
    if (upErr) throw upErr;
    const publicUrl = `${SB_URL}/storage/v1/object/public/actividades/${path}`;

    // Upload preview image if provided
    let previewUrl = null;
    const previewFile = document.getElementById('aPreview').files[0];
    if (previewFile) {
      msg.textContent = 'Subiendo vista previa...';
      const prevExt = previewFile.name.split('.').pop().toLowerCase();
      const prevPath = `previews/${Date.now()}_preview.${prevExt}`;
      const { error: prevErr } = await sb.storage.from('actividades').upload(prevPath, previewFile, { cacheControl:'3600', upsert:false });
      if (!prevErr) {
        previewUrl = `${SB_URL}/storage/v1/object/public/actividades/${prevPath}`;
      }
    }
    if (!previewUrl && tipo === 'imagen') {
      previewUrl = publicUrl;
    }

    msg.textContent = `Guardando... (preview: ${previewUrl ? 'sí' : 'no'})`;
    const { error: dbErr } = await sb.from('actividades').insert({
      titulo, tipo,
      categoria: document.getElementById('aCategoria').value,
      edad: document.getElementById('aEdad').value.trim() || null,
      archivo_url: publicUrl,
      preview_url: previewUrl,
      uploaded_by: currentUserId
    });
    if (dbErr) throw dbErr;

    msg.textContent = '✓ Actividad subida exitosamente.'; msg.className = 'upload-msg ok';
    ['aTitulo','aEdad','aArchivo','aPreview'].forEach(id => document.getElementById(id).value = '');
    await loadActividades();
  } catch(e) {
    msg.textContent = 'Error: ' + (e.message || JSON.stringify(e)); msg.className = 'upload-msg err';
  }
  btn.disabled = false; btn.textContent = '↑ Subir Actividad';
}

async function eliminarActividad(id, archivoUrl) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  await sb.from('actividades').delete().eq('id', id);
  const path = archivoUrl.split('/actividades/')[1];
  if (path) await sb.storage.from('actividades').remove([decodeURIComponent(path)]);
  await loadActividades();
}

init();
</script>
</body>
</html>
