<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODESH · קֹדֶשׁ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════
   VARIABLES & RESET
════════════════════════════════════════ */
:root {
  --gold:        #c9a84c;
  --gold-bright: #e8c96a;
  --gold-dim:    #5a4820;
  --gold-glow:   rgba(201,168,76,0.15);
  --bg:          #05050a;
  --bg2:         #0a0a12;
  --bg3:         #0f0f1a;
  --bg4:         #141428;
  --border:      #1a1a2a;
  --border2:     #252538;
  --text:        #ede5d5;
  --text-mid:    #a09880;
  --text-dim:    #5a5870;
  --green:       #5ccc68;
  --green-dim:   #1a3a1e;
  --blue:        #5a9cf0;
  --red:         #e05a5a;
  --scroll-w:    6px;
  --radius:      10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* scrollbar */
::-webkit-scrollbar { width: var(--scroll-w); }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

/* ════════════════════════════════════════
   NOISE OVERLAY
════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 64px 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main";
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ════════════════════════════════════════
   TOPBAR
════════════════════════════════════════ */
.topbar {
  grid-area: topbar;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.logo-hebrew {
  font-family: serif;
  font-size: 1.3rem;
  color: var(--gold);
  line-height: 1;
}
.logo-text {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 3px;
}
.logo-sep {
  width: 1px;
  height: 20px;
  background: var(--border2);
  margin: 0 4px;
}

.topbar-center { flex: 1; }

.progress-global {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-label {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}
.progress-bar-wrap {
  flex: 1;
  max-width: 300px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 2px;
  transition: width 0.5s ease;
}
.progress-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--gold);
  min-width: 40px;
  text-align: right;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.version-select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-mid);
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 1px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
.version-select:focus { border-color: var(--gold-dim); }

.btn-premium {
  background: linear-gradient(135deg, var(--gold-dim), #3a2a08);
  border: 1px solid var(--gold-dim);
  color: var(--gold-bright);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-premium:hover {
  background: linear-gradient(135deg, #3a2a08, var(--gold-dim));
  box-shadow: 0 0 16px var(--gold-glow);
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
.sidebar {
  grid-area: sidebar;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
}

.sidebar-section {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-title {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 16px;
  margin-bottom: 10px;
}

/* Testament selector */
.testament-tabs {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  margin-bottom: 12px;
}
.testament-tab {
  flex: 1;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  background: transparent;
  transition: all 0.2s;
}
.testament-tab.active {
  background: var(--gold-glow);
  border-color: var(--gold-dim);
  color: var(--gold);
}

/* Book list */
.book-list { list-style: none; }
.book-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 2px solid transparent;
}
.book-item:hover { background: var(--bg3); }
.book-item.active {
  background: var(--bg3);
  border-left-color: var(--gold);
}
.book-name {
  font-size: 0.88rem;
  color: var(--text-mid);
  flex: 1;
  line-height: 1.2;
}
.book-item.active .book-name { color: var(--text); }
.book-progress-mini {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-dim);
}
.book-item.active .book-progress-mini { color: var(--gold); }

/* Chapter dot grid */
.chapter-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  padding: 12px 16px;
}
.chapter-dot {
  aspect-ratio: 1;
  border-radius: 4px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.chapter-dot:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
}
.chapter-dot.read {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}
.chapter-dot.active {
  background: var(--gold-glow);
  border-color: var(--gold);
  color: var(--gold);
  font-weight: 600;
}

/* ════════════════════════════════════════
   MAIN CONTENT
════════════════════════════════════════ */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 40px 60px;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

/* Chapter header */
.chapter-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.chapter-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 60px;
  height: 1px;
  background: var(--gold);
}
.chapter-book-name {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
}
.chapter-title {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
}
.chapter-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.chapter-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* Read toggle */
.btn-read-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  margin-left: auto;
}
.btn-read-toggle:hover {
  border-color: var(--green);
  color: var(--green);
}
.btn-read-toggle.done {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}
.check-icon { font-size: 0.9rem; }

/* Bible text */
.bible-text {
  line-height: 1.9;
  font-size: 1.15rem;
  color: var(--text);
}

.verse {
  display: inline;
}

.verse-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--gold);
  vertical-align: super;
  margin-right: 3px;
  user-select: none;
  opacity: 0.8;
}

/* Clickable word */
.word {
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.1s, color 0.1s;
  padding: 0 1px;
}
.word:hover {
  background: var(--gold-glow);
  color: var(--gold-bright);
}
.word.highlighted {
  background: var(--gold-glow);
  color: var(--gold-bright);
}

/* Navigation buttons */
.chapter-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.btn-nav {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-mid);
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-nav:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
}
.btn-nav:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Loading state */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  gap: 16px;
  color: var(--text-dim);
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ════════════════════════════════════════
   LEXICON POPUP
════════════════════════════════════════ */
.lexicon-popup {
  position: fixed;
  z-index: 1000;
  width: 320px;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.05),
    0 20px 60px rgba(0,0,0,0.8),
    0 0 30px var(--gold-glow);
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px) scale(0.97);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
.lexicon-popup.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.lex-header {
  background: linear-gradient(135deg, #0e0b04, #1a1206);
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--gold-dim);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.lex-original {
  font-family: serif;
  font-size: 1.8rem;
  color: var(--gold-bright);
  line-height: 1;
  direction: rtl;
}
.lex-original.greek { direction: ltr; font-style: italic; }
.lex-header-right { flex: 1; }
.lex-transliteration {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--gold);
  margin-bottom: 3px;
}
.lex-strongs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
}
.lex-lang-badge {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  align-self: flex-start;
}
.lex-lang-badge.hebrew { background: #1a1000; color: var(--gold); border: 1px solid var(--gold-dim); }
.lex-lang-badge.greek  { background: #001020; color: var(--blue); border: 1px solid #1a3060; }

.lex-body { padding: 14px 16px; }
.lex-definition {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 12px;
}
.lex-section-title {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.lex-usage {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.lex-usage-tag {
  font-size: 0.72rem;
  color: var(--text-mid);
  background: var(--bg3);
  border: 1px solid var(--border2);
  padding: 2px 8px;
  border-radius: 20px;
}
.lex-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.lex-premium-hint {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-style: italic;
}
.lex-close {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.lex-close:hover { border-color: var(--red); color: var(--red); }

/* ════════════════════════════════════════
   MOBILE OVERLAY SIDEBAR
════════════════════════════════════════ */
.sidebar-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-mid);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
}

@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-areas:
      "topbar"
      "main";
  }
  .sidebar {
    position: fixed;
    left: -280px;
    top: 64px;
    height: calc(100vh - 64px);
    z-index: 200;
    transition: left 0.3s ease;
  }
  .sidebar.open { left: 0; }
  .sidebar-toggle { display: flex; }
  .main { padding: 24px 20px; }
  .chapter-title { font-size: 1.4rem; }
}

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bible-text { animation: fadeIn 0.4s ease; }
.chapter-header { animation: fadeIn 0.3s ease; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--green);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 0.9rem;
  padding: 12px 18px;
  border-radius: 8px;
  z-index: 2000;
  opacity: 0;
  transform: translateX(20px);
  transition: all 0.3s;
  pointer-events: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.toast.show {
  opacity: 1;
  transform: translateX(0);
}
</style>
</head>
<body>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ LEXICON POPUP ══ -->
<div class="lexicon-popup" id="lexiconPopup">
  <div class="lex-header">
    <div id="lexOriginal" class="lex-original"></div>
    <div class="lex-header-right">
      <div id="lexTranslit" class="lex-transliteration"></div>
      <div id="lexStrongs" class="lex-strongs"></div>
    </div>
    <span id="lexLangBadge" class="lex-lang-badge hebrew">Hebreo</span>
  </div>
  <div class="lex-body">
    <div id="lexDef" class="lex-definition"></div>
    <div class="lex-section-title">Usos en la Escritura</div>
    <div id="lexUsage" class="lex-usage"></div>
  </div>
  <div class="lex-footer">
    <span class="lex-premium-hint">✦ Análisis completo en Berith</span>
    <button class="lex-close" onclick="closeLexicon()">Cerrar</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="logo" href="#">
      <span class="logo-hebrew">קֹדֶשׁ</span>
      <span class="logo-sep"></span>
      <span class="logo-text">KODESH</span>
    </a>

    <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggle">☰</button>
    <a href="parashot.html" style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);transition:all 0.2s;" onmouseover="this.style.color='var(--gold)';this.style.borderColor='var(--gold-dim)'" onmouseout="this.style.color='var(--text-dim)';this.style.borderColor='var(--border2)'">Parashot</a>

    <div class="topbar-center">
      <div class="progress-global">
        <span class="progress-label">Biblia leída</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="globalProgressBar" style="width:0%"></div>
        </div>
        <span class="progress-pct" id="globalProgressPct">0.0%</span>
      </div>
    </div>

    <div class="topbar-right">
      <select class="version-select" id="versionSelect" onchange="changeVersion()">
        <option value="RVR60">RVR60</option>
        <option value="NVI">NVI</option>
        <option value="KJV">KJV</option>
      </select>
      <button class="btn-premium" onclick="showToast('✦ Próximamente — Plan Berith')">✦ Berith</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Testamento</div>
      <div class="testament-tabs">
        <button class="testament-tab active" id="tab-at" onclick="switchTestament('AT')">Antiguo</button>
        <button class="testament-tab" id="tab-nt" onclick="switchTestament('NT')">Nuevo</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Libros</div>
      <ul class="book-list" id="bookList"></ul>
    </div>

    <div class="sidebar-section" id="chapterSection" style="display:none">
      <div class="sidebar-title" id="chapterSidebarTitle">Capítulos</div>
      <div class="chapter-grid" id="chapterGrid"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando Escrituras</div>
    </div>
  </main>

</div>

<!-- ══ SCRIPT ══ -->
<script>
/* ════════════════════════════════════
   DATA — Bible structure
════════════════════════════════════ */
const BIBLE_BOOKS = {
  AT: [
    { id:'GEN', name:'Génesis',      abbr:'Gén',  chapters:50 },
    { id:'EXO', name:'Éxodo',        abbr:'Éxo',  chapters:40 },
    { id:'LEV', name:'Levítico',     abbr:'Lev',  chapters:27 },
    { id:'NUM', name:'Números',      abbr:'Núm',  chapters:36 },

// Total chapters in the Bible
const TOTAL_CHAPTERS = [...BIBLE_BOOKS.AT, ...BIBLE_BOOKS.NT].reduce((s, b) => s + b.chapters, 0);

/* ════════════════════════════════════
   LEXICÓN — Strong's dinámico
════════════════════════════════════ */
let STRONGS_DATA = null;

async function loadStrongs() {
  if (STRONGS_DATA) return STRONGS_DATA;
  try {
    const res = await fetch('./strongs.json');
    STRONGS_DATA = await res.json();
  } catch(e) {
    STRONGS_DATA = {};
  }
  return STRONGS_DATA;
}

// Preload on start
loadStrongs();

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
let state = {
  testament: 'AT',
  currentBook: 'GEN',
  currentChapter: 1,
  version: 'RVR60',
  readChapters: JSON.parse(localStorage.getItem('kodesh_read') || '{}'),
};

/* ════════════════════════════════════
   BIBLIA LOCAL — JSON
════════════════════════════════════ */
let BIBLE_DATA = null;

async function loadBibleData() {
  if (BIBLE_DATA) return BIBLE_DATA;
  const res = await fetch('./biblia-rvr.json');
  if (!res.ok) throw new Error('No se pudo cargar la Biblia');
  BIBLE_DATA = await res.json();
  return BIBLE_DATA;
}

async function fetchChapter(bookId, chapter) {
  const bible = await loadBibleData();
  const ch = bible[bookId]?.[String(chapter)];
  if (!ch) throw new Error(`No encontrado: ${bookId} ${chapter}`);
  return ch;
}

/* ════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════ */
function parseLocalChapter(chapterObj) {
  // chapterObj = { "1": "texto...", "2": "texto..." }
  return Object.entries(chapterObj).map(([num, text]) => ({ num, text }));
}

function makeClickableWords(text) {
  // Wrap each word in a span for lexicon lookup
  return text.replace(/(\S+)/g, (word) => {
    const clean = word.toLowerCase().replace(/[¿¡.,;:!?"""''()\[\]]/g, '');
    return `<span class="word" onclick="lookupWord(event,'${clean}','${word}')">${word}</span>`;
  });
}

function renderBibleText(verses, bookName, chapterNum) {
  const main = document.getElementById('mainContent');
  const bookData = getAllBooks().find(b => b.id === state.currentBook);
  const totalChapters = bookData ? bookData.chapters : 1;
  const isRead = isChapterRead(state.currentBook, chapterNum);
  const prevOk = chapterNum > 1;
  const nextOk = chapterNum < totalChapters;

  let html = `
    <div class="chapter-header">
      <div class="chapter-book-name">${bookName}</div>
      <div class="chapter-title">Capítulo ${chapterNum}</div>
      <div class="chapter-meta">
        <span class="chapter-badge">${state.version} · ${verses.length} versículos</span>
        <button class="btn-read-toggle ${isRead ? 'done' : ''}" id="readToggleBtn" onclick="toggleRead()">
          <span class="check-icon">${isRead ? '✓' : '○'}</span>
          ${isRead ? 'Leído' : 'Marcar leído'}
        </button>
      </div>
    </div>

    <div class="bible-text">
  `;

  verses.forEach(v => {
    const clickable = makeClickableWords(v.text);
    html += `<span class="verse"><sup class="verse-num">${v.num}</sup>${clickable} </span>`;
  });

  html += `</div>
    <div class="chapter-nav">
      <button class="btn-nav" onclick="goChapter(${chapterNum - 1})" ${!prevOk ? 'disabled' : ''}>
        ← Capítulo ${chapterNum - 1}
      </button>
      <span style="font-family:'Cinzel',serif;font-size:0.65rem;color:var(--text-dim);letter-spacing:2px">
        ${chapterNum} / ${totalChapters}
      </span>
      <button class="btn-nav" onclick="goChapter(${chapterNum + 1})" ${!nextOk ? 'disabled' : ''}>
        Capítulo ${chapterNum + 1} →
      </button>
    </div>
  `;

  main.innerHTML = html;
  main.scrollTo(0, 0);
}


/* ════════════════════════════════════
   LOAD CHAPTER
════════════════════════════════════ */
async function loadChapter(bookId, chapterNum) {
  state.currentBook = bookId;
  state.currentChapter = chapterNum;

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando escrituras</div>
    </div>
  `;

  const bookData = getAllBooks().find(b => b.id === bookId);
  const bookName = bookData ? bookData.name : bookId;

  updateChapterGrid();
  updateBookList();

  try {
    const chapterObj = await fetchChapter(bookId, chapterNum);
    const verses = parseLocalChapter(chapterObj);
    renderBibleText(verses, bookName, chapterNum);
  } catch (err) {
    main.innerHTML = `
      <div class="loading">
        <div style="font-size:2rem">⚠️</div>
        <div class="loading-text">Error cargando capítulo</div>
        <div style="font-size:0.8rem;color:var(--text-dim);margin-top:8px">${err.message}</div>
      </div>
    `;
  }

  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
function goChapter(num) {
  if (num < 1) return;
  const bookData = getAllBooks().find(b => b.id === state.currentBook);
  if (bookData && num > bookData.chapters) return;
  loadChapter(state.currentBook, num);
}

/* ════════════════════════════════════
   PROGRESS TRACKING
════════════════════════════════════ */
function getReadKey(bookId, chapter) {
  return `${bookId}:${chapter}`;
}
function isChapterRead(bookId, chapter) {
  return !!state.readChapters[getReadKey(bookId, chapter)];
}
function toggleRead() {
  const key = getReadKey(state.currentBook, state.currentChapter);
  if (state.readChapters[key]) {
    delete state.readChapters[key];
    showToast('Capítulo desmarcado');
  } else {
    state.readChapters[key] = true;
    showToast('✓ Capítulo marcado como leído');
  }
  localStorage.setItem('kodesh_read', JSON.stringify(state.readChapters));
  updateProgress();
  updateChapterGrid();

  const btn = document.getElementById('readToggleBtn');
  if (btn) {
    const isNowRead = !!state.readChapters[key];
    btn.className = `btn-read-toggle ${isNowRead ? 'done' : ''}`;
    btn.innerHTML = `<span class="check-icon">${isNowRead ? '✓' : '○'}</span> ${isNowRead ? 'Leído' : 'Marcar leído'}`;
  }
}

function updateProgress() {
  const readCount = Object.keys(state.readChapters).length;
  const pct = (readCount / TOTAL_CHAPTERS * 100).toFixed(1);
  document.getElementById('globalProgressBar').style.width = pct + '%';
  document.getElementById('globalProgressPct').textContent = pct + '%';
}

/* ════════════════════════════════════
   SIDEBAR — Book list
════════════════════════════════════ */
function getAllBooks() {
  return [...BIBLE_BOOKS.AT, ...BIBLE_BOOKS.NT];
}

function updateBookList() {
  const books = BIBLE_BOOKS[state.testament];
  const list = document.getElementById('bookList');
  list.innerHTML = '';

  books.forEach(book => {
    const readCount = Array.from({length: book.chapters}, (_, i) =>
      isChapterRead(book.id, i+1) ? 1 : 0
    ).reduce((a,b) => a+b, 0);

    const li = document.createElement('li');
    li.className = `book-item ${state.currentBook === book.id ? 'active' : ''}`;
    li.innerHTML = `
      <span class="book-name">${book.name}</span>
      <span class="book-progress-mini">${readCount}/${book.chapters}</span>
    `;
    li.onclick = () => selectBook(book.id);
    list.appendChild(li);
  });
}

function selectBook(bookId) {
  state.currentBook = bookId;
  updateBookList();
  showChapterSection(bookId);
}

function showChapterSection(bookId) {
  const bookData = getAllBooks().find(b => b.id === bookId);
  if (!bookData) return;

  const section = document.getElementById('chapterSection');
  const title = document.getElementById('chapterSidebarTitle');
  title.textContent = `${bookData.name} — Capítulos`;
  section.style.display = 'block';
  updateChapterGrid();
}

function updateChapterGrid() {
  const bookData = getAllBooks().find(b => b.id === state.currentBook);
  if (!bookData) return;

  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';

  for (let i = 1; i <= bookData.chapters; i++) {
    const div = document.createElement('div');
    const isRead = isChapterRead(state.currentBook, i);
    const isActive = state.currentChapter === i && state.currentBook === bookData.id;

    div.className = `chapter-dot ${isRead ? 'read' : ''} ${isActive ? 'active' : ''}`;
    div.textContent = i;
    div.onclick = () => loadChapter(state.currentBook, i);
    grid.appendChild(div);
  }
}

function switchTestament(t) {
  state.testament = t;
  document.getElementById('tab-at').classList.toggle('active', t === 'AT');
  document.getElementById('tab-nt').classList.toggle('active', t === 'NT');
  updateBookList();
  document.getElementById('chapterSection').style.display = 'none';
}

/* ════════════════════════════════════
   VERSION CHANGE
════════════════════════════════════ */
function changeVersion() {
  state.version = document.getElementById('versionSelect').value;
  loadChapter(state.currentBook, state.currentChapter);
}

/* ════════════════════════════════════
   LEXICON POPUP
════════════════════════════════════ */
async function lookupWord(event, cleanWord, rawWord) {
  event.stopPropagation();

  document.querySelectorAll('.word.highlighted').forEach(w => w.classList.remove('highlighted'));
  event.target.classList.add('highlighted');

  const strongs = await loadStrongs();
  const raw = cleanWord.toLowerCase();
  // Strip accents for fallback matching
  const noAccent = raw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-záéíóúüñ]/g,'');
  const noAccentClean = noAccent.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');

  // Try: exact → no-accent → no-accent-clean
  const entry = strongs[raw] || strongs[noAccent] || strongs[noAccentClean];

  const popup = document.getElementById('lexiconPopup');

  if (!entry) {
    document.getElementById('lexOriginal').textContent = '—';
    document.getElementById('lexOriginal').className = 'lex-original';
    document.getElementById('lexTranslit').textContent = rawWord;
    document.getElementById('lexStrongs').textContent = 'Ampliar en plan Berith ✦';
    document.getElementById('lexLangBadge').textContent = 'Hebreo';
    document.getElementById('lexLangBadge').className = 'lex-lang-badge hebrew';
    document.getElementById('lexDef').textContent = 'El análisis lexical completo de esta palabra está disponible en el plan Berith. Incluye Strong\'s número, raíz original, morfología y todos sus usos en las Escrituras.';
    document.getElementById('lexUsage').innerHTML = '';
  } else {
    document.getElementById('lexOriginal').textContent = entry.h;
    document.getElementById('lexOriginal').className = `lex-original ${entry.l === 'griego' ? 'greek' : ''}`;
    document.getElementById('lexTranslit').textContent = entry.t;
    document.getElementById('lexStrongs').textContent = entry.s;

    const badge = document.getElementById('lexLangBadge');
    badge.textContent = entry.l === 'hebreo' ? 'Hebreo' : 'Griego';
    badge.className = `lex-lang-badge ${entry.l === 'hebreo' ? 'hebrew' : 'greek'}`;

    document.getElementById('lexDef').textContent = entry.d;
    document.getElementById('lexUsage').innerHTML = entry.u.map(u =>
      `<span class="lex-usage-tag">${u}</span>`
    ).join('');
  }

  const rect = event.target.getBoundingClientRect();
  const popupW = 320;
  const popupH = 280;
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 8;

  if (left + popupW > window.innerWidth - 16) left = window.innerWidth - popupW - 16;
  if (top + popupH > window.innerHeight + window.scrollY - 16) {
    top = rect.top + window.scrollY - popupH - 8;
  }

  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.classList.add('visible');
}

function closeLexicon() {
  document.getElementById('lexiconPopup').classList.remove('visible');
  document.querySelectorAll('.word.highlighted').forEach(w => w.classList.remove('highlighted'));
}

// Close popup on outside click
document.addEventListener('click', (e) => {
  const popup = document.getElementById('lexiconPopup');
  if (!popup.contains(e.target) && !e.target.classList.contains('word')) {
    closeLexicon();
  }
});

/* ════════════════════════════════════
   SIDEBAR TOGGLE (mobile)
════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
function init() {
  updateBookList();
  updateProgress();
  selectBook('GEN');
  loadChapter('GEN', 1);
}

init();
