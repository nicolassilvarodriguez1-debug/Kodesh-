<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODESH · Lexicón Bíblico</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a84c; --gold-bright: #e8c46a;
  --gold-dim: rgba(201,168,76,0.2); --gold-glow: rgba(201,168,76,0.08);
  --bg: #06060e; --bg2: #0b0b16; --bg3: #10101e;
  --text: #ede5d0; --text-mid: #a89878; --text-dim: #4a4030;
  --border: rgba(255,255,255,0.05); --border2: rgba(201,168,76,0.15);
}
html[data-theme="light"] {
  --bg: #faf8f3; --bg2: #f3efe4; --bg3: #ede8d8;
  --text: #1a1408; --text-mid: #6b5a38; --text-dim: #b0a080;
  --border: rgba(0,0,0,0.06); --border2: rgba(201,168,76,0.3);
}
html, body {
  min-height: 100vh; background: var(--bg); color: var(--text);
  font-family: 'EB Garamond', Georgia, serif; overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border2);
  padding: 14px 24px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 2px;
  color: var(--text-dim); text-decoration: none; text-transform: uppercase;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--gold); }
.topbar-title {
  font-family: 'Cinzel', serif; font-size: 0.75rem;
  letter-spacing: 4px; color: var(--gold); text-transform: uppercase;
}
.topbar-right { display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  background: none; border: 1px solid var(--border2); border-radius: 20px;
  padding: 4px 12px; font-size: 0.7rem; cursor: pointer;
  color: var(--text-mid); transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--gold); color: var(--gold); }
.count-badge {
  font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 2px;
  color: var(--text-dim); text-transform: uppercase;
}

/* ── SEARCH ── */
.search-wrap {
  max-width: 800px; margin: 24px auto; padding: 0 20px;
}
.search-bar {
  display: flex; gap: 10px; align-items: center;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 16px;
  transition: border-color 0.2s;
}
.search-bar:focus-within { border-color: var(--gold); }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'EB Garamond', serif; font-size: 1rem;
  color: var(--text);
}
.search-input::placeholder { color: var(--text-dim); }

/* ── FILTERS ── */
.filters {
  max-width: 800px; margin: 0 auto 20px; padding: 0 20px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  border-color: var(--gold); color: var(--gold); background: var(--gold-glow);
}
.filter-btn.heb.active { border-color: #4a9eff; color: #4a9eff; background: rgba(74,158,255,0.08); }
.filter-btn.grk.active { border-color: #a84cc9; color: #a84cc9; background: rgba(168,76,201,0.08); }

/* ── ALPHABET BAR ── */
.alpha-bar {
  max-width: 800px; margin: 0 auto 24px; padding: 0 20px;
  display: flex; flex-wrap: wrap; gap: 4px;
}
.alpha-btn {
  font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: none; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  text-transform: uppercase;
}
.alpha-btn:hover, .alpha-btn.active {
  border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow);
}
.alpha-btn.has-words { border-color: var(--border2); color: var(--text-mid); }

/* ── GLOSARIO GRID ── */
.main {
  max-width: 800px; margin: 0 auto; padding: 0 20px 60px;
}

.letter-section { margin-bottom: 32px; }
.letter-header {
  font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700;
  color: var(--gold); letter-spacing: 3px;
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border2);
  text-transform: uppercase;
}

.word-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 10px;
}
@media(max-width: 600px) { .word-grid { grid-template-columns: 1fr; } }

.word-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  transition: all 0.2s; cursor: default;
}
.word-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.word-card-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px; margin-bottom: 8px;
}
.word-original {
  font-size: 1.4rem; line-height: 1;
  color: var(--gold);
}
.word-original.greek { color: #a84cc9; }
.word-badges { display: flex; gap: 4px; flex-shrink: 0; }
.lang-badge {
  font-family: 'Cinzel', serif; font-size: 0.48rem; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 3px; text-transform: uppercase;
}
.lang-badge.heb {
  background: rgba(74,158,255,0.1); color: #4a9eff;
  border: 1px solid rgba(74,158,255,0.2);
}
.lang-badge.grk {
  background: rgba(168,76,201,0.1); color: #a84cc9;
  border: 1px solid rgba(168,76,201,0.2);
}
.word-testament {
  font-family: 'Cinzel', serif; font-size: 0.45rem; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 3px; text-transform: uppercase;
  background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border);
}
.word-translit {
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  color: var(--text-mid); margin-bottom: 2px; font-style: italic;
}
.word-strongs {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  color: var(--text-dim); margin-bottom: 6px;
}
.word-spanish {
  font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 1px;
  color: var(--text); text-transform: capitalize; margin-bottom: 6px;
  font-weight: 600;
}
.word-definition {
  font-size: 0.88rem; color: var(--text-mid); line-height: 1.5;
  font-style: italic;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 16px; }
.empty-title {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 3px;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
}
.empty-sub { font-size: 0.9rem; font-style: italic; }

/* ── LOADING ── */
.loading { text-align: center; padding: 40px; color: var(--text-dim); font-style: italic; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/landing.html" class="back-btn">← Inicio</a>
    <div class="topbar-title">✦ Lexicón Bíblico</div>
  </div>
  <div class="topbar-right">
    <span class="count-badge" id="countBadge">— palabras</span>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-bar">
    <span style="color:var(--text-dim);font-size:1rem">🔍</span>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Buscar palabra en español, hebreo, griego o Strong's..."
      oninput="filterWords()">
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <span style="font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">Filtrar:</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn heb" data-filter="heb" onclick="setFilter('heb',this)">Hebreo AT</button>
  <button class="filter-btn grk" data-filter="grk" onclick="setFilter('grk',this)">Griego NT</button>
</div>

<!-- ALPHABET BAR -->
<div class="alpha-bar" id="alphaBar"></div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent">
  <div class="loading">Cargando el lexicón...</div>
</div>

<script>
const SUPABASE_URL = 'https://fvknbqdsgqdmwirrgcvb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2a25icWRzZ3FkbXdpcnJnY3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzU2NjYsImV4cCI6MjA5NjExMTY2Nn0.RqiuH5fafECN1yW5MjBP3zzHAdXLH4QD3gBL_WZ-hB0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allWords = [];
let activeFilter = 'all';
let activeLetter = null;

// ── THEME ──
function initTheme() {
  const saved = localStorage.getItem('kodesh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('kodesh_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

// ── LOAD DATA ──
async function loadLexicon() {
  try {
    // Load all cached words
    const { data, error } = await sb
      .from('lexicon_cache')
      .select('word, testament, strongs, lemma, transliteration, pronunciation, definition, language')
      .order('word', { ascending: true });

    if (error) throw error;

    allWords = (data || []).filter(w => w.strongs && w.lemma);
    document.getElementById('countBadge').textContent = `${allWords.length} palabra${allWords.length !== 1 ? 's' : ''}`;

    buildAlphaBar();
    renderWords();
  } catch(e) {
    console.error(e);
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-title">El lexicón está vacío</div>
        <div class="empty-sub">Las palabras se agregan automáticamente cuando los usuarios<br>hacen clic en ellas mientras leen la Biblia.</div>
      </div>`;
  }
}

function normalizeFirstLetter(word) {
  const first = word[0]?.toUpperCase() || '#';
  return first.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// ── ALPHABET BAR ──
function buildAlphaBar() {
  const letters = new Set(allWords.map(w => normalizeFirstLetter(w.word)).filter(Boolean));
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const bar = document.getElementById('alphaBar');
  bar.innerHTML = `<button class="alpha-btn active" onclick="setLetter(null,this)">Todas</button>`;
  alphabet.forEach(l => {
    if (letters.has(l)) {
      bar.innerHTML += `<button class="alpha-btn has-words" onclick="setLetter('${l}',this)">${l}</button>`;
    }
  });
}

function setLetter(letter, btn) {
  activeLetter = letter;
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWords();
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWords();
}

function filterWords() {
  renderWords();
}

function getFilteredWords() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  return allWords.filter(w => {
    // Language filter
    if (activeFilter === 'heb' && w.language !== 'hebreo') return false;
    if (activeFilter === 'grk' && w.language !== 'griego') return false;
    // Letter filter
    if (activeLetter && normalizeFirstLetter(w.word) !== activeLetter) return false;
    // Search filter
    if (query) {
      return w.word.includes(query) ||
        w.lemma?.toLowerCase().includes(query) ||
        w.strongs?.toLowerCase().includes(query) ||
        w.transliteration?.toLowerCase().includes(query) ||
        w.definition?.toLowerCase().includes(query);
    }
    return true;
  });
}

function renderWords() {
  const filtered = getFilteredWords();
  const main = document.getElementById('mainContent');

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Sin resultados</div>
        <div class="empty-sub">No se encontraron palabras con ese filtro.<br>El lexicón crece con el uso diario.</div>
      </div>`;
    return;
  }

  // Group by first letter
  const grouped = {};
  filtered.forEach(w => {
    const letter = normalizeFirstLetter(w.word);
    if (!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(w);
  });

  const letters = Object.keys(grouped).sort();
  main.innerHTML = letters.map(letter => `
    <div class="letter-section">
      <div class="letter-header">${letter}</div>
      <div class="word-grid">
        ${grouped[letter].map(w => renderWordCard(w)).join('')}
      </div>
    </div>
  `).join('');
}

function renderWordCard(w) {
  const isGreek = w.language === 'griego';
  const langClass = isGreek ? 'grk' : 'heb';
  const langLabel = isGreek ? 'Griego' : 'Hebreo';
  const testamentLabel = w.testament === 'NT' ? 'Nuevo Testamento' : 'Antiguo Testamento';

  return `
    <div class="word-card">
      <div class="word-card-top">
        <div class="word-original ${isGreek ? 'greek' : ''}">${w.lemma || '—'}</div>
        <div class="word-badges">
          <span class="lang-badge ${langClass}">${langLabel}</span>
          <span class="word-testament">${testamentLabel}</span>
        </div>
      </div>
      <div class="word-spanish">${w.word}</div>
      ${w.transliteration ? `<div class="word-translit">${w.transliteration}${w.pronunciation ? ` · ${w.pronunciation}` : ''}</div>` : ''}
      <div class="word-strongs">${w.strongs || ''}</div>
      <div class="word-definition">${w.definition || '—'}</div>
    </div>
  `;
}

// ── INIT ──
initTheme();
loadLexicon();
</script>
</body>
</html>
